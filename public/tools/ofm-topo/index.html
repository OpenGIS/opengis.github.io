<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MapLibre Contour Lines Demo</title>
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <link
      href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/maplibre-contour@latest/dist/index.min.js"></script>
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 0;
      }
      #map {
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      const TERRARIUM_URL =
        "https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png";

      const terrainSource = {
        type: "raster-dem",
        tiles: [TERRARIUM_URL],
        encoding: "terrarium",
        tileSize: 256,
        maxzoom: 14,
      };

      const map = new maplibregl.Map({
        container: "map",
        style: "https://tiles.openfreemap.org/styles/liberty",

        // Skovhuggeren mtb_scale example:
        // center: [10.52302507, 55.0952585],

        // Cumberland mtb:scale:imba example:
        // center: [-125.022417, 49.607406],

        // Pove del Grappa 45.821142,11.7373742
        center: [11.7373742, 45.824042],

        zoom: 12.3,
        pitch: 0,
        bearing: 0,
      });

      map.on("style.load", () => {
        // === Terrain & hillshade ===
        map.addSource("terrainSource", terrainSource);
        map.setTerrain({
          source: "terrainSource",
          exaggeration: 1.5,
        });

        // Subtle hillshade — restrained to match liberty-topo's subtlety; contour lines should remain legible
        map.addLayer({
          id: "hillshade-layer",
          type: "hillshade",
          source: "terrainSource",
          paint: {
            "hillshade-exaggeration": 0.2,
          },
        });

        // === Contours ===
        const demSource = new mlcontour.DemSource({
          url: TERRARIUM_URL,
          encoding: "terrarium",
          maxzoom: 13,
          worker: true,
          cacheSize: 100,
          timeoutMs: 10000,
        });
        demSource.setupMaplibre(maplibregl);
        map.addSource("contour-source", {
          type: "vector",
          minzoom: 10,
          tiles: [
            demSource.contourProtocolUrl({
              thresholds: {
                0: [100, 500],
                5: [50, 250],
                10: [25, 100],
                15: [25, 100],
              },
              contourLayer: "contours",
              elevationKey: "ele",
              levelKey: "level",
              extent: 4096,
              buffer: 1,
            }),
          ],
          maxzoom: 15,
        });

        // Regular contour lines — subtle warm grey, low opacity (matching liberty-topo restraint)
        map.addLayer({
          id: "contour-lines",
          type: "line",
          source: "contour-source",
          "source-layer": "contours",
          minzoom: 10,
          filter: ["==", ["get", "level"], 0],
          paint: {
            "line-color": "rgb(126, 124, 121)",
            "line-opacity": 0.25,
            "line-width": 0.5,
          },
        });

        // Index contour lines (every Nth) — slightly wider, but still restrained (matching liberty-topo)
        map.addLayer({
          id: "contour-lines-index",
          type: "line",
          source: "contour-source",
          "source-layer": "contours",
          minzoom: 10,
          filter: [">", ["get", "level"], 0],
          paint: {
            "line-color": "rgb(124, 122, 121)",
            "line-opacity": 0.1,
            "line-width": 1.0,
          },
        });

        // Contour elevation labels — only on index lines, map-aligned, small and restrained (matching liberty-topo)
        map.addLayer({
          id: "contour-labels",
          type: "symbol",
          source: "contour-source",
          "source-layer": "contours",
          minzoom: 11,
          filter: [">", ["get", "level"], 0],
          layout: {
            "symbol-placement": "line",
            "symbol-avoid-edges": true,
            "text-rotation-alignment": "map",
            "text-size": ["interpolate", ["linear"], ["zoom"], 11, 6, 18, 10],
            "text-field": [
              "concat",
              ["number-format", ["get", "ele"], {}],
              "m",
            ],
            "text-font": ["Noto Sans Regular"],
            "text-padding": 0,
          },
          paint: {
            "text-color": "#5c5c5c",
            "text-halo-color": "rgba(255, 255, 255, 0.85)",
            "text-halo-width": 1.25,
          },
        });

        // MTB trail highlighting (openfreemap/openmaptiles mtb_scale)
        map.addLayer({
          id: "mtb_scale-casing",
          type: "line",
          metadata: {
            "mapbox:group": "1444849345966.4436",
          },
          source: "openmaptiles",
          "source-layer": "transportation",
          filter: [
            "all",
            ["==", "$type", "LineString"],
            ["!=", "brunnel", "tunnel"],
            ["has", "mtb_scale"],
          ],
          layout: {
            "line-cap": "round",
            "line-join": "round",
          },
          paint: {
            "line-color": [
              "match",
              ["get", "mtb_scale"],
              "1",
              "blue",
              "2",
              "red",
              "black",
            ],
            "line-opacity": {
              stops: [
                [13, 0],
                [16, 1],
              ],
            },
            "line-width": {
              base: 1.2,
              stops: [
                [12, 0.5],
                [16, 3],
              ],
            },
          },
        });

        // === Path/track highlighting — override liberty's white dashed paths to redish brown for better visibility ===
        if (map.getLayer("road_path_pedestrian")) {
          map.setPaintProperty("road_path_pedestrian", "line-color", "#9d4d26");
        }

        // Tunnel paths
        if (map.getLayer("tunnel_path_pedestrian")) {
          map.setPaintProperty(
            "tunnel_path_pedestrian",
            "line-color",
            "#9d4d26",
          );
        }

        // Bridge paths
        if (map.getLayer("bridge_path_pedestrian")) {
          map.setPaintProperty(
            "bridge_path_pedestrian",
            "line-color",
            "#9d4d26",
          );
        }
      });
    </script>
  </body>
</html>
